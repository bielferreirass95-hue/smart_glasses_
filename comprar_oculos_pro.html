<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Vision Pro - Smart Glasses</title>
    <style>
        /* ESTILOS GERAIS */
        body {
            background-color: rgb(4, 14, 41);
            color: #f0f0f0;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* CONTAINER PRINCIPAL DO CHECKOUT */
        .checkout-container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(0, 247, 255, 0.2);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 40px;
            display: flex;
            gap: 40px;
            box-sizing: border-box;
            flex-wrap: wrap; /* Responsividade */
        }

        /* SEÇÃO DO RESUMO DO PRODUTO (LADO ESQUERDO) */
        .product-summary {
            flex: 1;
            min-width: 300px;
            text-align: center;
            border-right: 1px solid rgba(0, 247, 255, 0.1);
            padding-right: 40px;
        }

        .product-summary img {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.3);
            margin-bottom: 20px;
        }

        .product-summary h2 {
            color: #00f7ff;
            text-shadow: 0 0 10px #00f7ff33;
            margin-bottom: 10px;
        }

        .price {
            color: #ffd700;
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* SEÇÃO DO FORMULÁRIO (LADO DIREITO) */
        .checkout-form {
            flex: 1.5;
            min-width: 300px;
        }

        h3 {
            color: #00f7ff;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* ESTILOS DOS CAMPOS DE ENTRADA */
        label {
            color: rgba(255, 255, 255, 0.7);
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0a1e35;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #00f7ff;
            box-shadow: 0 0 10px rgba(0, 247, 255, 0.3);
        }

        /* GRUPO DE CAMPOS LADO A LADO */
        .form-group-row {
            display: flex;
            gap: 15px;
        }

        /* BOTÃO FINALIZAR */
        .btn-finalizar {
            width: 100%;
            padding: 18px;
            background: #00f7ff;
            color: #040e29;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.5);
            margin-top: 10px;
        }

        .btn-finalizar:hover {
            box-shadow: 0 0 30px #00f7ff;
            transform: scale(1.02);
        }

        /* LINK PARA VOLTAR */
        .back-link {
            display: block;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            margin-top: 20px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-link:hover {
            color: #00f7ff;
        }

        /* RESPONSIVIDADE PARA CELULARES */
        @media (max-width: 768px) {
            .checkout-container {
                flex-direction: column;
                padding: 20px;
                margin: 20px;
            }
            .product-summary {
                border-right: none;
                border-bottom: 1px solid rgba(0, 247, 255, 0.1);
                padding-right: 0;
                padding-bottom: 20px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="checkout-container">
            
            <div class="product-summary">
                <img src="oculos1.jpeg" alt="">
                <h2>Vision Pro</h2>
                <p style="color: rgba(255,255,255,0.7);">Realidade Aumentada e Navegação</p>
                <div class="price">R$ 4.999,00</div>
                <p style="color: #00f7ff; font-size: 0.9rem;">Frete Grátis para todo o Brasil</p>
            </div>

            <div class="checkout-form">
                <form action="#" method="post">
                    
                    <h3>1. Seus Dados</h3>
                    <label>Nome Completo:</label>
                    <input type="text" name="nome" placeholder="Nome como no cartão" required>

                    <div class="form-group-row">
                        <div style="flex: 2;">
                            <label>E-mail:</label>
                            <input type="email" name="email" placeholder="seu@email.com" required>
                        </div>
                        <div style="flex: 1;">
                            <label>CPF:</label>
                            <input type="text" name="cpf" placeholder="000.000.000-00" required>
                        </div>
                    </div>

                    <h3>2. Entrega</h3>
                    <div class="form-group-row">
                        <div style="flex: 1;">
                            <label>CEP:</label>
                            <input type="text" name="cep" placeholder="00000-000" required>
                        </div>
                        <div style="flex: 2;">
                            <label>Endereço:</label>
                            <input type="text" name="endereco" placeholder="Rua, Número, Apto" required>
                        </div>
                    </div>

                    <h3>3. Pagamento</h3>
                    <label>Forma de Pagamento:</label>
                    <select name="pagamento" required>
                        <option value="" disabled selected>Selecione...</option>
                        <option value="cartao">Cartão de Crédito (até 12x)</option>
                        <option value="pix">Pix (com 5% de desconto)</option>
                        <option value="boleto">Boleto Bancário</option>
                    </select>

                    <button type="submit" class="btn-finalizar">
                        Finalizar Compra Segura
                    </button>

                </form>

               <div style="text-align: center; width: 100%; margin-top: 20px;">
<a href="index.html#secao-modelos" style="color: #00f7ff; text-decoration: underline; font-family: sans-serif; font-weight: bold; font-size: 1.1rem; transition: 0.3s; display: inline-block; margin-bottom: 20px;" 
   onmouseover="this.style.color='#ffffff'; this.style.textShadow='0 0 10px #00f7ff';" 
   onmouseout="this.style.color='#00f7ff'; this.style.textShadow='none';">
    ← Voltar para os Modelos
</a>
            </div>

        </div>
    </div>

</body>
</html>
